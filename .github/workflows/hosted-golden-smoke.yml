name: Hosted Golden Smoke

on:
  schedule:
  - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      space_url:
        description: Override HF Space URL for smoke test
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: hosted-golden-smoke
  cancel-in-progress: false

jobs:
  hosted-golden-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev,mesh]"

      - name: Run hosted golden smoke
        env:
          IMAGEEZ_HF_SPACE_URL: ${{ github.event.inputs.space_url || 'https://th3w1zard1-imageezgen3d.hf.space/' }}
        run: |
          PYTHONPATH=src python scripts/hosted_golden_smoke.py \
            --space-url "$IMAGEEZ_HF_SPACE_URL" \
            --json --record hosted-golden-smoke.json

      - name: Verify hosted golden smoke record
        run: PYTHONPATH=src python scripts/verify_hosted_golden_smoke_record.py hosted-golden-smoke.json

      - name: Run hosted export tier smoke
        env:
          IMAGEEZ_HF_SPACE_URL: ${{ github.event.inputs.space_url || 'https://th3w1zard1-imageezgen3d.hf.space/' }}
        run: |
          PYTHONPATH=src python scripts/hosted_export_tier_smoke.py \
            --space-url "$IMAGEEZ_HF_SPACE_URL" \
            --record hosted-export-tier-smoke.json

      - name: Verify hosted export tier smoke record
        run: >-
          PYTHONPATH=src python scripts/verify_hosted_export_tier_smoke_record.py
          hosted-export-tier-smoke.json

      - name: Verify hosted smoke artifact bundle
        run: PYTHONPATH=src python scripts/verify_hosted_smoke_artifacts.py

      - name: Hunyuan G7 live probe (adapter disabled honesty)
        env:
          IMAGEEZ_HF_SPACE_URL: ${{ github.event.inputs.space_url || 'https://th3w1zard1-imageezgen3d.hf.space/' }}
        run: |
          PYTHONPATH=src python scripts/hunyuan_g7_preflight.py \
            --live-probe --json --record hunyuan-g7-live-probe.json \
            --space-url "$IMAGEEZ_HF_SPACE_URL"

      - name: Hunyuan preflight bundle (audit + enablement + parity)
        run: python scripts/hunyuan_preflight_bundle.py --json

      - name: Hunyuan G7 preflight readiness
        run: PYTHONPATH=src python scripts/hunyuan_g7_preflight.py

      - name: Upload hosted golden smoke record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hosted-golden-smoke
          path: |
            hosted-golden-smoke.json
            hosted-export-tier-smoke.json
            hunyuan-g7-live-probe.json
            hunyuan-admission-audit.json
            hunyuan-enablement-preflight.json
          if-no-files-found: warn
