name: Runtime Artifacts

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish
        required: false
        default: ""
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: runtime-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      primary_tag: ${{ steps.outputs.outputs.primary_tag }}
      additional_tags: ${{ steps.outputs.outputs.additional_tags }}
      release_tag: ${{ steps.outputs.outputs.release_tag }}
      publish_latest: ${{ steps.outputs.outputs.publish_latest }}
      default_image_reference: ${{ steps.outputs.outputs.default_image_reference }}
      ghcr_destination: ${{ steps.outputs.outputs.ghcr_destination }}
      ghcr_action: ${{ steps.outputs.outputs.ghcr_action }}
      ghcr_chart_registry: ${{ steps.outputs.outputs.ghcr_chart_registry }}
      dockerhub_destination: ${{ steps.outputs.outputs.dockerhub_destination }}
      dockerhub_action: ${{ steps.outputs.outputs.dockerhub_action }}
      gitlab_registry_destination: ${{ steps.outputs.outputs.gitlab_registry_destination }}
      gitlab_registry_action: ${{ steps.outputs.outputs.gitlab_registry_action }}
      github_release_action: ${{ steps.outputs.outputs.github_release_action }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev]"

      - name: Show release plan
        env:
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag || '' }}
        run: |
          echo "## Runtime artifact plan" >> "$GITHUB_STEP_SUMMARY"
          PYTHONPATH=src python scripts/release_plan_check.py --image-tag "$IMAGE_TAG_INPUT" >> "$GITHUB_STEP_SUMMARY"

      - name: Emit workflow outputs
        id: outputs
        env:
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag || '' }}
        run: PYTHONPATH=src python scripts/release_workflow_outputs.py --image-tag "$IMAGE_TAG_INPUT"

  render-assets:
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev]"

      - name: Render deploy assets
        run: |
          mkdir -p dist/runtime-artifacts
          PYTHONPATH=src python scripts/render_deploy_assets.py \
            --image "${{ needs.plan.outputs.default_image_reference }}" \
            --output-dir dist/runtime-artifacts/rendered

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Package Helm chart
        run: |
          mkdir -p dist/runtime-artifacts/packages
          helm package dist/runtime-artifacts/rendered/helm/imageezgen3d \
            --destination dist/runtime-artifacts/packages

      - name: Bundle rendered assets
        run: |
          tar -czf dist/runtime-artifacts/runtime-artifacts.tgz -C dist/runtime-artifacts rendered packages

      - name: Upload rendered artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts
          path: dist/runtime-artifacts

  publish-images:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: docker buildx create --use --name imageez-release-builder

      - name: Log in to GHCR
        if: needs.plan.outputs.ghcr_action == 'push'
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Log in to Docker Hub
        if: needs.plan.outputs.dockerhub_action == 'push'
        env:
          DOCKERHUB_USERNAME: ${{ secrets[format('DOCKERHUB_{0}', 'USERNAME')] }}
          DOCKERHUB_TOKEN: ${{ secrets[format('DOCKERHUB_{0}', 'TOKEN')] }}
        run: echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Log in to GitLab registry
        if: needs.plan.outputs.gitlab_registry_action == 'push'
        env:
          GITLAB_TOKEN: ${{ secrets[format('{0}_{1}', 'GITLAB', 'TOKEN')] }}
          GITLAB_USERNAME: ${{ secrets[format('{0}_{1}', 'GITLAB', 'USERNAME')] }}
        run: |
          echo "$GITLAB_TOKEN" | docker login registry.gitlab.com \
            -u "${GITLAB_USERNAME:-oauth2}" --password-stdin

      - name: Build and push image set
        env:
          GHCR_ACTION: ${{ needs.plan.outputs.ghcr_action }}
          GHCR_DESTINATION: ${{ needs.plan.outputs.ghcr_destination }}
          DOCKERHUB_ACTION: ${{ needs.plan.outputs.dockerhub_action }}
          DOCKERHUB_DESTINATION: ${{ needs.plan.outputs.dockerhub_destination }}
          GITLAB_REGISTRY_ACTION: ${{ needs.plan.outputs.gitlab_registry_action }}
          GITLAB_REGISTRY_DESTINATION: ${{ needs.plan.outputs.gitlab_registry_destination }}
          PRIMARY_TAG: ${{ needs.plan.outputs.primary_tag }}
          ADDITIONAL_TAGS: ${{ needs.plan.outputs.additional_tags }}
        run: |
          tags=()
          add_tags() {
            destination="$1"
            tags+=("-t" "${destination}:${PRIMARY_TAG}")
            IFS=',' read -r -a extras <<< "$ADDITIONAL_TAGS"
            for tag in "${extras[@]}"; do
              if [[ -n "$tag" ]]; then
                tags+=("-t" "${destination}:${tag}")
              fi
            done
          }
          if [[ "$GHCR_ACTION" == "push" && -n "$GHCR_DESTINATION" ]]; then
            add_tags "$GHCR_DESTINATION"
          fi
          if [[ "$DOCKERHUB_ACTION" == "push" && -n "$DOCKERHUB_DESTINATION" ]]; then
            add_tags "$DOCKERHUB_DESTINATION"
          fi
          if [[ "$GITLAB_REGISTRY_ACTION" == "push" && -n "$GITLAB_REGISTRY_DESTINATION" ]]; then
            add_tags "$GITLAB_REGISTRY_DESTINATION"
          fi
          if [[ "${#tags[@]}" -eq 0 ]]; then
            echo "No registry targets are active; skipping image push."
            exit 0
          fi
          docker buildx build --push "${tags[@]}" .

  publish-helm:
    if: github.event_name != 'pull_request' && needs.plan.outputs.ghcr_action == 'push' && needs.plan.outputs.ghcr_chart_registry != ''
    runs-on: ubuntu-latest
    needs:
      - plan
      - render-assets
    steps:
      - name: Download rendered artifacts
        uses: actions/download-artifact@v4
        with:
          name: runtime-artifacts
          path: dist/runtime-artifacts

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Log in to GHCR Helm registry
        run: echo "${{ github.token }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Helm chart
        run: |
          chart_package=$(find dist/runtime-artifacts/packages -name '*.tgz' | head -n 1)
          if [[ -z "$chart_package" ]]; then
            echo "No packaged Helm chart found."
            exit 1
          fi
          helm push "$chart_package" "${{ needs.plan.outputs.ghcr_chart_registry }}"

  publish-release-assets:
    if: github.event_name != 'pull_request' && needs.plan.outputs.github_release_action == 'push'
    runs-on: ubuntu-latest
    needs:
      - plan
      - render-assets
    steps:
      - name: Download rendered artifacts
        uses: actions/download-artifact@v4
        with:
          name: runtime-artifacts
          path: dist/runtime-artifacts

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.plan.outputs.release_tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "Runtime artifacts $RELEASE_TAG" --notes "Automated runtime artifact bundle"
          gh release upload "$RELEASE_TAG" dist/runtime-artifacts/runtime-artifacts.tgz --clobber