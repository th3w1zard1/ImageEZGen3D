name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lint tooling
        run: python -m pip install ruff==0.11.13
      - name: Run Ruff
        run: ruff check app.py src scripts tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        if: ${{ success() || failure() }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev,mesh]"

      - name: Run unit tests
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run compile checks
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python -m compileall -q app.py src tests scripts

      - name: Run Python style guard
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python scripts/check_python_style.py

  release-preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: ${{ success() || failure() }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev,mesh]"

      - name: Run release preflight tests
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python -m unittest tests.test_release_config tests.test_release_plan

      - name: Show release dry-run summary
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python scripts/release_plan_check.py

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install smoke test tooling
        run: python -m pip install --upgrade pip build
      - name: Install editable package metadata
        run: python -m pip install -e . --no-deps
      - name: Run package discovery tests
        run: python -m unittest tests.test_release_config tests.test_gh_cli

  hunyuan-admission-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev,mesh]"

      - name: Verify Hunyuan G1 LICENSE at pin
        run: PYTHONPATH=src python scripts/hunyuan_g1_legal_verify.py

      - name: Hunyuan G5 resource budget estimate
        run: PYTHONPATH=src python scripts/hunyuan_resource_estimate.py

      - name: Hunyuan preflight bundle (audit + enablement + parity)
        run: python scripts/hunyuan_preflight_bundle.py

      - name: GPU forward E2E fixture verify
        run: PYTHONPATH=src python scripts/verify_gpu_forward_e2e_fixtures.py

      - name: Workstation evidence preflight (no record)
        run: PYTHONPATH=src python scripts/hunyuan_workstation_evidence_preflight.py /tmp/missing-gpu-forward-e2e.json

      - name: Hunyuan G7 preflight readiness (G1-G6)
        run: PYTHONPATH=src python scripts/hunyuan_g7_preflight.py

  hunyuan-dependency-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install base package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,mesh]"

      - name: Run Hunyuan dependency smoke (G3)
        run: PYTHONPATH=src python scripts/hunyuan_dependency_smoke.py

  golden-sample:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev,mesh]"

      - name: Run golden sample attestation
        run: |
          PYTHONPATH=src python scripts/golden_sample_attestation.py \
            --json --record golden-attestation.json

      - name: Upload golden attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-sample-attestation
          path: golden-attestation.json
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build distribution artifacts
        run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
