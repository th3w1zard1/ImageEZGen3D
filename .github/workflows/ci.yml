name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lint tooling
        run: python -m pip install ruff==0.11.13
      - name: Run Ruff
        run: ruff check gradio_app.py demo.py hy3dpaint hy3dshape scripts tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        if: ${{ success() || failure() }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev]"

      - name: Run unit tests
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run compile checks
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python -m compileall -q app.py src tests scripts

      - name: Run Python style guard
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python scripts/check_python_style.py

  release-preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: ${{ success() || failure() }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev]"

      - name: Run release preflight tests
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python -m unittest tests.test_release_config tests.test_release_plan

      - name: Show release dry-run summary
        if: ${{ success() || failure() }}
        run: PYTHONPATH=src python scripts/release_plan_check.py

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install smoke test tooling
        run: python -m pip install pytest>=8.3,<9
      - name: Install editable package metadata
        run: python -m pip install -e . --no-deps
      - name: Run package discovery tests
        run: python -m pytest tests/test_package_discovery.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install build tooling
        run: python -m pip install -r requirements/build.txt
      - name: Build distribution artifacts
        run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
