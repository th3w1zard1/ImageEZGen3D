apiVersion: apps/v1
kind: Deployment
metadata:
  name: imageezgen3d
  labels:
    app.kubernetes.io/name: imageezgen3d
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: imageezgen3d
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imageezgen3d
    spec:
      containers:
        - name: imageezgen3d
          image: ghcr.io/th3w1zard1/imageezgen3d:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7865